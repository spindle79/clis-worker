services:
  - type: web
    name: clis-worker
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      # Long-lived OAuth token for the Claude Code CLI (backs the /claude
      # endpoint). Generate locally with `claude setup-token` while logged
      # in to your Pro/Max subscription, then paste the value here.
      # Do NOT also set ANTHROPIC_API_KEY for the same process — claude
      # prefers the API key when both are present, which would bill against
      # API credit instead of the subscription.
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false
      - key: SCRAPE_CREATORS_API_KEY_AUTH
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      # Contentful credentials — set in the Render dashboard. The space + env IDs
      # default to a sensible 'master' but can be overridden per deploy.
      - key: CONTENTFUL_MANAGEMENT_TOKEN
        sync: false
      - key: CONTENTFUL_DELIVERY_TOKEN
        sync: false
      - key: CONTENTFUL_PREVIEW_TOKEN
        sync: false
      - key: CONTENTFUL_SPACE_ID
        sync: false
      - key: CONTENTFUL_ENVIRONMENT_ID
        value: master
      # GA4 service-account auth. The JSON itself is mounted via a Render
      # Secret File (dashboard → Environment → Secret Files); this var just
      # tells ADC where to find it. GA_PROPERTY_ID is the default property
      # numeric ID; ga4-pp-cli falls back to per-call --property if unset.
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/ga4-sa.json
      - key: GA_PROPERTY_ID
        sync: false
      - key: WORKER_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PRESS_DATA_DIR
        value: /data
      - key: PORT
        value: "3000"
    disk:
      name: press-data
      mountPath: /data
      sizeGB: 1
