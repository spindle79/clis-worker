services:
  - type: web
    name: clis-worker
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SCRAPE_CREATORS_API_KEY_AUTH
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      # Contentful credentials — set in the Render dashboard. The space + env IDs
      # default to a sensible 'master' but can be overridden per deploy.
      - key: CONTENTFUL_MANAGEMENT_TOKEN
        sync: false
      - key: CONTENTFUL_DELIVERY_TOKEN
        sync: false
      - key: CONTENTFUL_PREVIEW_TOKEN
        sync: false
      - key: CONTENTFUL_SPACE_ID
        sync: false
      - key: CONTENTFUL_ENVIRONMENT_ID
        value: master
      - key: WORKER_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PRESS_DATA_DIR
        value: /data
      - key: PORT
        value: "3000"
    disk:
      name: press-data
      mountPath: /data
      sizeGB: 1
